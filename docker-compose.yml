version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: pkdac-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pkdac_db
      MYSQL_USER: pkdac_user
      MYSQL_PASSWORD: pkdac_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pkdac-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pkdac-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://pkdac_user:pkdac_password@mysql:3306/pkdac_db"
      NEXTAUTH_SECRET: "your-secret-key-here-change-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
      CLOUDINARY_CLOUD_NAME: "your-cloud-name"
      CLOUDINARY_API_KEY: "your-api-key"
      CLOUDINARY_API_SECRET: "your-api-secret"
      RESEND_API_KEY: "your-resend-api-key"
      RESEND_FROM_EMAIL: "noreply@yourdomain.com"
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - pkdac-network
    command: sh -c "npx prisma migrate deploy && node server.js"

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: pkdac-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - pkdac-network

volumes:
  mysql_data:
    driver: local

networks:
  pkdac-network:
    driver: bridge
